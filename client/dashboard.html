<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Footprint Logger</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <h1>📊 Dashboard</h1>
        <div class="nav-links">
            <a href="index.html">← Back to Logger</a>
            <button id="dashboard-logout">Logout</button>
        </div>

        <div id="dashboard-content">
            <!-- User Info Card -->
            <div class="card">
                <h2>Welcome, <span id="dashboard-username"></span></h2>
                <p>Weekly Streak: <span id="streak-count">0</span> days</p>
                <p>This Week's Total: <span id="weekly-total">0</span> kg CO₂</p>
            </div>

            <!-- Summary Cards -->
            <div class="summary-grid">
                <div class="card">
                    <h3>Total Emissions (All Time)</h3>
                    <p><span id="alltime-total">0</span> kg CO₂</p>
                </div>
                <div class="card">
                    <h3>Community Average (7 days)</h3>
                    <p><span id="community-avg">0</span> kg CO₂</p>
                </div>
            </div>

            <!-- Charts -->
            <div class="chart-container">
                <h3>Your Emissions by Category (This Week)</h3>
                <canvas id="dashboard-category-chart"></canvas>
            </div>

            <div class="chart-container">
                <h3>Your vs Community Average</h3>
                <canvas id="comparison-chart"></canvas>
            </div>

            <!-- Personalized Tip -->
            <div class="card tip-card">
                <h3>💡 Personalized Tip</h3>
                <p id="personalized-tip">Loading...</p>
            </div>

            <!-- Activity History -->
            <div class="card">
                <h3>Recent Activities</h3>
                <ul id="dashboard-activity-list"></ul>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
