<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footprint Logger</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <h1>🌍 Footprint Logger</h1>

        <!-- Auth Section -->
        <div id="auth-section" class="card">
            <div class="tabs">
                <button id="show-login" class="tab-btn active">Login</button>
                <button id="show-register" class="tab-btn">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <h2>Login</h2>
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <h2>Register</h2>
                <input type="text" id="reg-username" placeholder="Username" required>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-password" placeholder="Password (min 6 chars)" required>
                <button type="submit">Register</button>
            </form>
            <div id="auth-message" class="message"></div>
        </div>

        <!-- Main App Section (hidden until login) -->
        <div id="app-section" style="display: none;">
            <div class="user-bar">
                <span id="welcome-user"></span>
                <button id="logout-btn">Logout</button>
                <a href="dashboard.html" class="btn-dashboard">Go to Dashboard</a>
            </div>

            <div class="card">
                <h2>Log Daily Activity</h2>
                <form id="activity-form">
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="transport">Transport</option>
                        <option value="food">Food</option>
                        <option value="energy">Energy</option>
                    </select>

                    <select id="activity-preset" required>
                        <option value="">Select Activity</option>
                    </select>

                    <input type="number" id="quantity" placeholder="Quantity (km, kg, kWh)" step="0.1" min="0" required>

                    <p>CO₂ Value: <span id="co2-value-display">0</span> kg</p>
                    <button type="submit">Add Activity</button>
                </form>
            </div>

            <div class="card">
                <h2>Filter Activities</h2>
                <select id="filter-category">
                    <option value="all">All Categories</option>
                    <option value="transport">Transport</option>
                    <option value="food">Food</option>
                    <option value="energy">Energy</option>
                </select>
            </div>

            <div class="card">
                <h2>Running Total: <span id="total-emissions">0</span> kg CO₂</h2>
            </div>

            <div class="chart-container">
                <canvas id="category-chart"></canvas>
            </div>

            <div class="card">
                <h2>Today's Logged Activities</h2>
                <ul id="activity-list"></ul>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
